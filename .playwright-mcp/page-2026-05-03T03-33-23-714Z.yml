      - list [ref=e70]:
        - listitem [ref=e71]:
          - link "0. 核心定位" [ref=e72] [cursor=pointer]:
            - /url: /chapters/00-positioning
          - text: ：说明本书为什么以 PostgreSQL 为入口，如何把数据库学习连接到大数据与 AI 数据基础设施。
        - listitem [ref=e73]:
          - link "1. 数据库基础：用 PostgreSQL 建立数据系统直觉" [ref=e74] [cursor=pointer]:
            - /url: /chapters/01-postgresql-foundations
          - text: ：用 PostgreSQL 建立数据如何被组织、约束、查询和保持一致的基础直觉。
        - listitem [ref=e75]:
          - link "2. SQL 分析能力：大数据方向第一硬技能" [ref=e76] [cursor=pointer]:
            - /url: /chapters/02-sql-analysis
          - text: ：把 SQL 从查询语法提升为分析表达能力，训练取数、聚合、关联、窗口和指标口径。
        - listitem [ref=e77]:
          - link "3. PostgreSQL 大表能力：理解单机数据库边界" [ref=e78] [cursor=pointer]:
            - /url: /chapters/03-postgresql-large-tables
          - text: ：从分区、索引、物化视图和执行计划理解 PostgreSQL 如何支撑大表，以及边界在哪里。
        - listitem [ref=e79]:
          - link "4. OLTP vs OLAP：大数据系统的第一分水岭" [ref=e80] [cursor=pointer]:
            - /url: /chapters/04-oltp-olap
          - text: ：解释业务交易和分析计算为什么会分化，以及 PostgreSQL 与 OLAP 系统如何分工。
        - listitem [ref=e81]:
          - link "5. 数据仓库建模：从表设计到分析建模" [ref=e82] [cursor=pointer]:
            - /url: /chapters/05-data-warehouse-modeling
          - text: ：把业务表重构成事实表、维度表、分层模型和稳定指标体系。
        - listitem [ref=e83]:
          - link "6. ETL / ELT：数据如何进入大数据系统" [ref=e84] [cursor=pointer]:
            - /url: /chapters/06-etl-elt
          - text: ：说明 PostgreSQL 数据如何通过批量同步、CDC、转换和调度进入数据平台。
        - listitem [ref=e85]:
          - link "7. 批处理系统：Hive / Spark / Trino" [ref=e86] [cursor=pointer]:
            - /url: /chapters/07-batch-processing
          - text: ：理解 Hive、Spark、Trino 在历史数据加工、分布式计算和跨源分析中的定位。
        - listitem [ref=e87]:
          - link "8. 实时数据处理：Kafka / Flink" [ref=e88] [cursor=pointer]:
            - /url: /chapters/08-stream-processing
          - text: ：围绕事件流、状态、窗口、水位线和一致性理解实时数据系统。
        - listitem [ref=e89]:
          - link "9. OLAP 数据库：ClickHouse / Doris / DuckDB" [ref=e90] [cursor=pointer]:
            - /url: /chapters/09-olap-databases
          - text: ：理解列式存储、MPP、本地 OLAP 和 PostgreSQL 到分析库的链路。
        - listitem [ref=e91]:
          - link "10. 向量数据库：面向 AI / RAG / 语义检索的数据系统" [ref=e92] [cursor=pointer]:
            - /url: /chapters/10-vector-databases
          - text: ：把非结构化数据转成可检索语义空间，理解 RAG、混合检索和向量治理。
        - listitem [ref=e93]:
          - link "11. 图数据库：面向关系网络 / 知识图谱 / 路径分析的数据系统" [ref=e94] [cursor=pointer]:
            - /url: /chapters/11-graph-databases
          - text: ：理解节点、边、路径、多跳查询、知识图谱和 GraphRAG 在数据平台中的位置。
        - listitem [ref=e95]:
          - link "12. 数据湖与湖仓架构" [ref=e96] [cursor=pointer]:
            - /url: /chapters/12-lakehouse
          - text: ：用对象存储、文件格式、表格式、Catalog 和多引擎查询构建开放分析底座。
        - listitem [ref=e97]:
          - link "13. 数据治理与工程化" [ref=e98] [cursor=pointer]:
            - /url: /chapters/13-data-governance
          - text: ：覆盖质量、元数据、血缘、权限、指标和 AI 知识治理，让数据平台长期可信。
        - listitem [ref=e99]:
          - link "14. 大数据方向项目实战" [ref=e100] [cursor=pointer]:
            - /url: /chapters/14-projects
          - text: ：用 7 个项目把 PostgreSQL、OLAP、实时、湖仓、RAG、图和治理串成可执行闭环。
        - listitem [ref=e101]:
          - link "15. 推荐学习顺序" [ref=e102] [cursor=pointer]:
            - /url: /chapters/15-learning-order
          - text: ：给出从 PostgreSQL 到数据治理的阶段化学习路径，避免直接跳工具。
        - listitem [ref=e103]:
          - link "16. 能力地图" [ref=e104] [cursor=pointer]:
            - /url: /chapters/16-capability-map
          - text: ：把全书能力沉淀为 SQL、建模、链路、选型和治理五类能力。
        - listitem [ref=e105]:
          - link "17. 最终学习目标" [ref=e106] [cursor=pointer]:
            - /url: /chapters/17-final-goals
          - text: ：定义从会查数据到会构建智能数据系统的最终能力标准。
