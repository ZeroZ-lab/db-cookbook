services:
  postgres:
    image: postgres:17
    container_name: db-cookbook-postgres
    environment:
      POSTGRES_USER: db_cookbook
      POSTGRES_PASSWORD: db_cookbook
      POSTGRES_DB: db_cookbook_lab
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_cookbook -d db_cookbook_lab"]
      interval: 5s
      timeout: 5s
      retries: 10
